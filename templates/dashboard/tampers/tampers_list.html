{% extends "dashboard/base.html" %}
{% load static %}
{% block title %}拓展插件列表{% endblock %}

{% block body %}
<link rel="stylesheet" href="{% static 'css/prism.css' %}">
<div class="row">
    <div class="col-xs-12">
      <div class="box">
        <div class="box-header">
          <h3 class="box-title">拓展插件列表</h3>
        </div>
        <div class="box-body">
          <div class="km-tamper-split">
            <div class="km-tamper-list">
              <div class="km-tamper-list-header">
                <input id="tamperFilterInput" class="form-control input-sm km-tamper-filter" placeholder="搜索拓展插件...">
              </div>
              <div id="tamperList" class="km-tamper-items">
                {% for name, detail in tampers.items %}
                  <button type="button" class="km-tamper-item" data-name="{{ name|lower }}" data-lang="{{ detail.language }}">
                    <span class="km-tamper-item-name">{{ name }}</span>
                    {% if detail.language %}
                    <span class="label label-default">{{ detail.language }}</span>
                    {% endif %}
                  </button>
                  <textarea id="tamperName{{ forloop.counter0 }}" class="km-tamper-source">{{ name }}</textarea>
                  <textarea id="tamperLang{{ forloop.counter0 }}" class="km-tamper-source">{{ detail.language }}</textarea>
                  <textarea id="tamperFilter{{ forloop.counter0 }}" class="km-tamper-source">{{ detail.FilterFunction }}</textarea>
                  <textarea id="tamperCS{{ forloop.counter0 }}" class="km-tamper-source">{{ detail.ControlledSources }}</textarea>
                  <textarea id="tamperES{{ forloop.counter0 }}" class="km-tamper-source">{{ detail.ExtraSinks }}</textarea>
                  <input type="hidden" class="km-tamper-real-id" data-index="{{ forloop.counter0 }}" value="">
                {% endfor %}
              </div>
            </div>
            <div class="km-tamper-detail">
              <div class="km-tamper-detail-toolbar">
                <div id="tamperDetailTitle" class="km-tamper-detail-title">选择一个拓展插件查看详情</div>
                <a id="tamperSourceLink" href="#" class="btn btn-default btn-xs" style="display:none"><i class="fa fa-file-code-o"></i> 查看源码</a>
                <button id="tamperCopyBtn" type="button" class="btn btn-default btn-xs">复制</button>
              </div>
              <pre class="language-python"><code id="tamperDetailCode" class="language-python"></code></pre>
            </div>
          </div>
        </div>
        <!-- /.box-body -->
      </div>
      <!-- /.box -->
    </div>
</div>
{% endblock %}

{% block script %}

<script src="{% static 'js/prism.js' %}"></script>

<script>
      $(document).ready(function () {
          $("#dashboard").removeClass("active menu-open");
          $("#dashboard").find("ul li").removeClass("active");
          $("#tampers").addClass("menu-open");
          $("#tampers").find("ul").find("li#tamper_list").addClass("active");
          $("#tampers").find("ul").css("display","block");

          var $list = $("#tamperList");
          var $detailTitle = $("#tamperDetailTitle");
          var detailCodeEl = document.getElementById("tamperDetailCode");

          function setActive($btn) {
              $list.find(".km-tamper-item").removeClass("is-active");
              $btn.addClass("is-active");
          }

          function showDetail($btn) {
              var idx = $list.find(".km-tamper-item").index($btn);
              if (idx < 0) idx = $btn.closest(".km-tamper-item").index();
              var name = $("#tamperName" + idx).val() || "";
              var lang = $("#tamperLang" + idx).val() || "";
              var filterText = $("#tamperFilter" + idx).val() || "";
              var csText = $("#tamperCS" + idx).val() || "";
              var esText = $("#tamperES" + idx).val() || "";
              $detailTitle.text(name);
              var code = 'FRAMEWORK_NAME = "' + name + '"\n'
                  + 'LANGUAGE = "' + lang + '"\n\n'
                  + 'FILTER_FUNCTIONS = ' + filterText + '\n\n'
                  + 'CONTROLLED_SOURCES = ' + csText + '\n\n'
                  + 'EXTRA_SINKS = ' + esText;
              detailCodeEl.textContent = code;
              if (window.Prism) {
                  Prism.highlightElement(detailCodeEl);
              }
              // 更新源码链接（用 tamper 名称作为 id 查询）
              if (name) {
                  $("#tamperSourceLink").attr("href", "{% url 'dashboard:tamper_detail' 0 %}".replace("/0/", "/" + encodeURIComponent(name) + "/")).show();
              } else {
                  $("#tamperSourceLink").hide();
              }
          }

          function pickFirstVisible() {
              var $first = $list.find(".km-tamper-item:visible").first();
              if ($first.length) {
                  setActive($first);
                  showDetail($first);
              } else {
                  $list.find(".km-tamper-item").removeClass("is-active");
                  $detailTitle.text("没有匹配的拓展插件");
                  detailCodeEl.textContent = "";
              }
          }

          $list.on("click", ".km-tamper-item", function () {
              var $btn = $(this);
              setActive($btn);
              showDetail($btn);
          });

          $("#tamperFilterInput").on("input", function () {
              var q = ($(this).val() || "").toLowerCase().trim();
              $list.find(".km-tamper-item").each(function () {
                  var $btn = $(this);
                  var name = ($btn.attr("data-name") || "");
                  var lang = ($btn.attr("data-lang") || "");
                  var ok = !q || name.indexOf(q) > -1 || lang.indexOf(q) > -1;
                  $btn.toggle(ok);
              });
              pickFirstVisible();
          });

          $("#tamperCopyBtn").on("click", function () {
              var text = detailCodeEl.textContent || "";
              if (!text) return;
              if (navigator.clipboard && navigator.clipboard.writeText) {
                  navigator.clipboard.writeText(text);
              } else {
                  var $tmp = $("<textarea>");
                  $("body").append($tmp);
                  $tmp.val(text).select();
                  document.execCommand("copy");
                  $tmp.remove();
              }
          });

          pickFirstVisible();
      });
</script>


{% endblock %}
